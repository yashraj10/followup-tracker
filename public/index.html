<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow-Up Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1120; --surface: #111827; --border: #1E293B; --border2: #334155;
    --text: #E2E8F0; --text2: #94A3B8; --text3: #64748B; --text4: #475569;
    --accent: #818CF8; --green: #10B981; --yellow: #F59E0B; --red: #EF4444;
    --orange: #F97316; --blue: #3B82F6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  button:hover { filter: brightness(1.15); }
  select { font-family: 'DM Sans', sans-serif; }

  .app { max-width: 960px; margin: 0 auto; padding: 28px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  .title { font-size: 26px; font-weight: 700; color: #F1F5F9; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
  .title-icon { color: var(--accent); font-size: 22px; }
  .subtitle { color: var(--text3); font-size: 13px; margin-top: 4px; font-family: 'Space Mono', monospace; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tab-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; }
  .tab-btn.active { background: var(--border); color: var(--text); border-color: var(--border2); }
  .refresh-btn { padding: 8px 16px; border-radius: 8px; border: 1px dashed var(--border2); background: transparent; color: var(--accent); font-size: 13px; font-weight: 600; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
  .status-dot.error { background: var(--red); }
  .status-dot.loading { background: var(--yellow); animation: pulse 1.2s ease infinite; }

  /* Filters */
  .filters { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: var(--text4); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .chip { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-size: 12px; font-weight: 500; }
  .chip.active { background: var(--border); color: var(--accent); border-color: var(--accent); }

  /* Cards */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .contact-card { background: var(--surface); border-radius: 10px; padding: 16px 20px; border: 1px solid var(--border); border-left: 3px solid var(--yellow); animation: fadeIn 0.3s ease both; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-name { font-size: 16px; font-weight: 600; color: #F1F5F9; }
  .card-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .urg-badge { font-size: 13px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 3px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
  .status-text { font-size: 12px; font-weight: 500; }
  .card-tags { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .cat-tag { font-size: 11px; background: var(--border); color: var(--accent); padding: 3px 10px; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; font-family: 'Space Mono', monospace; }
  .card-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
  .mini-select { background: var(--bg); color: #CBD5E1; border: 1px solid var(--border2); border-radius: 6px; padding: 5px 10px; font-size: 12px; }
  .action-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 500; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: 10px; padding: 20px; border: 1px solid var(--border); text-align: center; }
  .stat-val { font-size: 32px; font-family: 'Space Mono', monospace; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }

  /* Analytics */
  .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .analytic-card { background: var(--surface); border-radius: 10px; padding: 24px; border: 1px solid var(--border); }
  .analytic-title { font-size: 14px; font-weight: 600; color: #CBD5E1; margin-bottom: 16px; }
  .bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .urg-card { flex: 1 1 80px; background: var(--bg); border-radius: 8px; padding: 16px 12px; text-align: center; border: 1px solid; min-width: 80px; }

  /* Draft Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s ease; }
  .modal { background: var(--surface); border-radius: 16px; padding: 32px; border: 1px solid var(--border); width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; font-weight: 700; color: #F1F5F9; margin-bottom: 8px; }
  .modal-meta { color: var(--text3); font-size: 13px; margin-bottom: 16px; }
  .draft-area { width: 100%; padding: 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.7; resize: vertical; outline: none; font-family: 'DM Sans', sans-serif; min-height: 200px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .cancel-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; }
  .save-btn { padding: 10px 24px; border-radius: 8px; border: none; background: var(--accent); color: var(--bg); font-size: 13px; font-weight: 700; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; color: #F1F5F9; font-size: 14px; font-weight: 600; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: toastIn 0.3s ease; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

  /* Loader */
  .loader { display: flex; justify-content: center; align-items: center; min-height: 60vh; color: var(--text3); font-family: 'Space Mono', monospace; gap: 12px; }
  .loader-pulse { animation: pulse 1.2s ease infinite; color: var(--accent); font-size: 24px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Responsive */
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .analytics-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// =========================================================
// CONFIG — Update this after deploying to Vercel
// =========================================================
const API_BASE = window.location.origin;
// If testing locally, set: const API_BASE = "http://localhost:3000";

// =========================================================
// Constants
// =========================================================
const CATEGORIES = ["Job Application", "Recruiter", "Networking"];
const STATUSES = ["Sent", "Followed Up", "Replied", "Ghosted"];
const STATUS_COLORS = { Sent: "#F59E0B", "Followed Up": "#3B82F6", Replied: "#10B981", Ghosted: "#EF4444" };

const TEMPLATES = {
  "Job Application": (name, company, role) =>
    `Hi ${name},\n\nI wanted to follow up on my application for the ${role || "[Role]"} position at ${company || "[Company]"}. I remain very interested in this opportunity and would love to discuss how my background in ML engineering and data science could contribute to the team.\n\nWould you have time for a brief chat this week?\n\nBest,\nYashraj`,
  Recruiter: (name, company, role) =>
    `Hi ${name},\n\nThanks again for reaching out about the ${role || "[Role]"} role at ${company || "[Company]"}. I wanted to circle back and see if there are any updates on the timeline or next steps.\n\nHappy to provide any additional information that would be helpful.\n\nBest,\nYashraj`,
  Networking: (name, company) =>
    `Hi ${name},\n\nHope you're doing well! I really appreciated our conversation and wanted to stay connected. I'm currently exploring opportunities in DS/ML engineering — if anything comes to mind at ${company || "[Company]"} or in your network, I'd love to hear about it.\n\nThanks again!\n\nBest,\nYashraj`,
};

function urgency(days) {
  if (days <= 2) return { label: "Fresh", color: "#10B981", bg: "rgba(16,185,129,0.1)" };
  if (days <= 5) return { label: "On Track", color: "#3B82F6", bg: "rgba(59,130,246,0.1)" };
  if (days <= 7) return { label: "Follow Up", color: "#F59E0B", bg: "rgba(245,158,11,0.12)" };
  if (days <= 14) return { label: "Overdue", color: "#F97316", bg: "rgba(249,115,22,0.12)" };
  return { label: "Cold", color: "#EF4444", bg: "rgba(239,68,68,0.1)" };
}

function daysSince(dateStr) {
  return Math.max(0, Math.floor((new Date() - new Date(dateStr)) / 86400000));
}

function formatDate(dateStr) {
  try { return new Date(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
  catch { return dateStr; }
}

// =========================================================
// State
// =========================================================
let state = {
  contacts: [],
  view: "list",
  filter: "All",
  statusFilter: "All",
  sortBy: "urgency",
  loading: true,
  connected: false,
  error: null,
  draftContact: null,
  draftText: "",
  toast: null,
  lastRefresh: null,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// =========================================================
// API
// =========================================================
async function fetchContacts() {
  setState({ loading: true, error: null });
  try {
    const res = await fetch(`${API_BASE}/api/contacts`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    setState({ contacts: data.contacts || [], loading: false, connected: true, lastRefresh: new Date() });
  } catch (err) {
    setState({ loading: false, connected: false, error: err.message });
  }
}

async function updateContactStatus(pageId, status) {
  try {
    await fetch(`${API_BASE}/api/update-status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pageId, status, lastContact: new Date().toISOString().split("T")[0] }),
    });
    showToast(`Status → ${status}`);
    fetchContacts(); // refresh
  } catch (err) {
    showToast("Update failed", "error");
  }
}

function showToast(msg, type = "success") {
  setState({ toast: { msg, type } });
  setTimeout(() => setState({ toast: null }), 3000);
}

function openDraft(contact) {
  const fn = TEMPLATES[contact.category] || TEMPLATES["Networking"];
  const text = fn(contact.name.split(" ")[0], contact.company, contact.role);
  setState({ draftContact: contact, draftText: text });
}

function closeDraft() {
  setState({ draftContact: null, draftText: "" });
}

function copyDraft() {
  navigator.clipboard.writeText(state.draftText);
  showToast("Copied to clipboard");
  closeDraft();
}

// =========================================================
// Render
// =========================================================
function render() {
  const app = document.getElementById("app");
  const { contacts, view, filter, statusFilter, sortBy, loading, connected, error, toast, draftContact, draftText, lastRefresh } = state;

  const filtered = contacts
    .filter(c => filter === "All" || c.category === filter)
    .filter(c => statusFilter === "All" || c.status === statusFilter)
    .sort((a, b) => {
      if (sortBy === "urgency") return daysSince(b.lastContact) - daysSince(a.lastContact);
      if (sortBy === "name") return a.name.localeCompare(b.name);
      return new Date(b.lastContact) - new Date(a.lastContact);
    });

  const needFollow = contacts.filter(c => c.status !== "Replied" && c.status !== "Ghosted" && daysSince(c.lastContact) >= 5).length;
  const replied = contacts.filter(c => c.status === "Replied").length;
  const ghosted = contacts.filter(c => c.status === "Ghosted").length;
  const responseRate = contacts.length > 0 ? ((replied / contacts.length) * 100).toFixed(0) : 0;

  let html = "";

  // Toast
  if (toast) {
    const bg = toast.type === "error" ? "#92400E" : "#065F46";
    html += `<div class="toast" style="background:${bg}">${toast.type === "error" ? "⚠" : "✓"} ${toast.msg}</div>`;
  }

  // Header
  html += `
    <div class="header">
      <div>
        <h1 class="title"><span class="title-icon">◈</span> Follow-Up Tracker</h1>
        <p class="subtitle">
          <span class="status-dot ${loading ? 'loading' : connected ? 'connected' : 'error'}"></span>
          ${loading ? "Syncing..." : connected ? `${contacts.length} contacts · ${needFollow} need follow-up` : `Disconnected: ${error || "Check config"}`}
          ${lastRefresh ? ` · ${formatDate(lastRefresh.toISOString())} ${lastRefresh.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}` : ""}
        </p>
      </div>
      <div class="header-actions">
        <button class="tab-btn ${view === 'list' ? 'active' : ''}" onclick="setState({view:'list'})">⊞ Pipeline</button>
        <button class="tab-btn ${view === 'analytics' ? 'active' : ''}" onclick="setState({view:'analytics'})">◎ Analytics</button>
        <button class="refresh-btn" onclick="fetchContacts()">↻ Refresh</button>
      </div>
    </div>
  `;

  if (loading && contacts.length === 0) {
    html += `<div class="loader"><span class="loader-pulse">◈</span> Syncing with Notion...</div>`;
    app.innerHTML = html;
    return;
  }

  if (view === "list") {
    // Filters
    html += `<div class="filters">`;
    html += `<div class="filter-group"><span class="filter-label">Category</span>`;
    ["All", ...CATEGORIES].forEach(c => {
      const label = c === "Job Application" ? "Jobs" : c === "Networking" ? "Network" : c;
      html += `<button class="chip ${filter === c ? 'active' : ''}" onclick="setState({filter:'${c}'})">${label}</button>`;
    });
    html += `</div><div class="filter-group"><span class="filter-label">Status</span>`;
    ["All", ...STATUSES].forEach(s => {
      const extra = statusFilter === s && STATUS_COLORS[s] ? `border-color:${STATUS_COLORS[s]};color:${STATUS_COLORS[s]}` : "";
      html += `<button class="chip ${statusFilter === s ? 'active' : ''}" style="${extra}" onclick="setState({statusFilter:'${s}'})">${s}</button>`;
    });
    html += `</div><div class="filter-group"><span class="filter-label">Sort</span>`;
    [["urgency","Urgency"],["name","Name"],["date","Recent"]].forEach(([k,l]) => {
      html += `<button class="chip ${sortBy === k ? 'active' : ''}" onclick="setState({sortBy:'${k}'})">${l}</button>`;
    });
    html += `</div></div>`;

    if (filtered.length === 0) {
      html += `<div class="empty"><div class="empty-icon">◇</div><p style="color:var(--text2);font-size:15px">${contacts.length === 0 ? "No contacts yet. Send an email from Outlook and Power Automate will log it here." : "No contacts match your filters."}</p></div>`;
    } else {
      html += `<div class="card-list">`;
      filtered.forEach((c, i) => {
        const days = daysSince(c.lastContact);
        const urg = urgency(days);
        html += `
          <div class="contact-card" style="border-left-color:${STATUS_COLORS[c.status]};animation-delay:${i * 0.04}s">
            <div class="card-top">
              <div style="flex:1;min-width:0">
                <div class="card-name">${esc(c.name)}</div>
                <div class="card-meta">
                  ${c.company ? `<span>${esc(c.company)}</span>` : ""}
                  ${c.role ? `<span style="opacity:.6"> · ${esc(c.role)}</span>` : ""}
                  ${c.email ? `<span style="opacity:.4;font-size:12px"> · ${esc(c.email)}</span>` : ""}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div class="urg-badge" style="color:${urg.color};background:${urg.bg}">${days}d — ${urg.label}</div>
                <div class="status-text" style="color:${STATUS_COLORS[c.status]}">● ${c.status}</div>
              </div>
            </div>
            <div class="card-tags">
              <span class="cat-tag">${c.category}</span>
              <span style="font-size:12px;color:var(--text3)">Last: ${formatDate(c.lastContact)}</span>
              ${c.notes ? `<span style="font-size:12px;color:var(--text3);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px">"${esc(c.notes)}"</span>` : ""}
            </div>
            <div class="card-actions">
              <select class="mini-select" value="${c.status}" onchange="updateContactStatus('${c.id}', this.value)">
                ${STATUSES.map(s => `<option ${s === c.status ? 'selected' : ''}>${s}</option>`).join("")}
              </select>
              <button class="action-btn" onclick='openDraft(${JSON.stringify(c).replace(/'/g, "\\'")})'>✉ Draft</button>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }
  }

  if (view === "analytics") {
    html += `
      <div class="stats-row">
        ${[{l:"Total",v:contacts.length,c:"#818CF8"},{l:"Response Rate",v:responseRate+"%",c:"#10B981"},{l:"Need Follow-Up",v:needFollow,c:"#F59E0B"},{l:"Ghosted",v:ghosted,c:"#EF4444"}]
          .map(s => `<div class="stat-card"><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join("")}
      </div>
      <div class="analytics-grid">
        <div class="analytic-card">
          <h3 class="analytic-title">Pipeline Status</h3>
          ${STATUSES.map(s => {
            const count = contacts.filter(c => c.status === s).length;
            const pct = contacts.length > 0 ? (count / contacts.length) * 100 : 0;
            return `<div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="color:${STATUS_COLORS[s]};font-size:13px;font-weight:500">● ${s}</span>
                <span style="color:var(--text2);font-size:13px">${count}</span>
              </div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${STATUS_COLORS[s]}"></div></div>
            </div>`;
          }).join("")}
        </div>
        <div class="analytic-card">
          <h3 class="analytic-title">By Category</h3>
          ${CATEGORIES.map(cat => {
            const count = contacts.filter(c => c.category === cat).length;
            const rep = contacts.filter(c => c.category === cat && c.status === "Replied").length;
            return `<div style="margin-bottom:16px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="color:#CBD5E1;font-size:13px">${cat}</span>
                <span style="color:var(--text2);font-size:12px">${rep}/${count} replied</span>
              </div>
              <div class="bar-track"><div class="bar-fill" style="width:${count > 0 ? (rep/count)*100 : 0}%;background:var(--accent)"></div></div>
            </div>`;
          }).join("")}
        </div>
        <div class="analytic-card" style="grid-column:1/-1">
          <h3 class="analytic-title">Urgency Breakdown (Active)</h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
            ${["Fresh","On Track","Follow Up","Overdue","Cold"].map(label => {
              const active = contacts.filter(c => c.status !== "Replied" && c.status !== "Ghosted");
              const count = active.filter(c => urgency(daysSince(c.lastContact)).label === label).length;
              const color = {Fresh:"#10B981","On Track":"#3B82F6","Follow Up":"#F59E0B",Overdue:"#F97316",Cold:"#EF4444"}[label];
              return `<div class="urg-card" style="border-color:${color}">
                <div style="font-size:24px;font-family:'Space Mono',monospace;color:${color};font-weight:700">${count}</div>
                <div style="font-size:12px;color:var(--text2)">${label}</div>
              </div>`;
            }).join("")}
          </div>
        </div>
      </div>
    `;
  }

  // Draft modal
  if (draftContact) {
    html += `
      <div class="modal-overlay" onclick="if(event.target===this)closeDraft()">
        <div class="modal">
          <h2>Follow-Up → ${esc(draftContact.name)}</h2>
          <p class="modal-meta">${esc(draftContact.company)} · ${draftContact.category} · Last: ${formatDate(draftContact.lastContact)} (${daysSince(draftContact.lastContact)}d ago)</p>
          <textarea class="draft-area" id="draft-textarea">${esc(draftText)}</textarea>
          <div class="modal-actions">
            <button class="cancel-btn" onclick="closeDraft()">Close</button>
            <button class="save-btn" onclick="copyDraft()">Copy to Clipboard</button>
          </div>
        </div>
      </div>
    `;
  }

  app.innerHTML = html;

  // Sync draft textarea changes
  const ta = document.getElementById("draft-textarea");
  if (ta) ta.addEventListener("input", (e) => { state.draftText = e.target.value; });
}

function esc(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// =========================================================
// Init
// =========================================================
fetchContacts();
// Auto-refresh every 5 minutes
setInterval(fetchContacts, 300000);
</script>
</body>
</html>
